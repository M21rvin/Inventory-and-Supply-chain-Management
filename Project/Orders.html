<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IMS — Orders</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="products.css">
  <link rel="stylesheet" href="orders.css">
</head>
<body>

<div class="shell">
  <aside class="sidebar">
    <div class="logo"><div class="logo-dot"></div>IMS</div>
    <div class="nav-label">Main</div>
    <nav>
      <ul>
        <li><a href="dashboard.html"><span class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></span>Dashboard</a></li>
        <li><a href="products.html"><span class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></span>Products</a></li>
        <li><a href="suppliers.html"><span class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>Suppliers</a></li>
        <li class="active"><a href="orders.html"><span class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span>Orders</a></li>
        <li><a href="reports.html"><span class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>Reports</a></li>
      </ul>
    </nav>
    <div class="sidebar-footer">
      <a href="login.html"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</a>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <h1 class="page-title">Or<span>ders</span></h1>
      <div class="topbar-right">
        <div class="date-badge" id="dateDisplay"></div>
        <div class="avatar">A</div>
      </div>
    </div>

    <div class="content">
      <div class="toolbar">
        <div class="search-wrap">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" class="search-input" placeholder="Search orders..." id="searchInput">
        </div>
        <div class="toolbar-right">
          <select class="filter-select" id="filterStatus">
            <option value="">All Status</option>
            <option value="Pending">Pending</option>
            <option value="Processing">Processing</option>
            <option value="Delivered">Delivered</option>
            <option value="Cancelled">Cancelled</option>
          </select>
          <button class="btn-add" id="openModal">+ New Order</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Order ID</th><th>Product</th><th>Supplier</th><th>Qty</th><th>Total</th><th>Date</th><th>Status</th><th>Actions</th></tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="8" style="color:var(--muted);font-size:11px;padding:20px">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">New Order</div>
      <button class="modal-close" id="closeModal">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label>Product Name</label><input type="text" id="fProduct" placeholder="e.g. Wireless Headset Pro"></div>
        <div class="form-group"><label>Supplier</label><input type="text" id="fSupplier" placeholder="e.g. SoundWave Inc"></div>
        <div class="form-group"><label>Quantity</label><input type="number" id="fQty" placeholder="e.g. 10"></div>
        <div class="form-group"><label>Unit Price (₹)</label><input type="number" id="fPrice" placeholder="e.g. 3499"></div>
        <div class="form-group"><label>Status</label><select id="fStatus"><option>Pending</option><option>Processing</option><option>Delivered</option><option>Cancelled</option></select></div>
        <div class="form-group"><label>Date</label><input type="date" id="fDate"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="cancelModal">Cancel</button>
      <button class="btn-save" id="saveOrder">Save Order</button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM -->
<div class="modal-overlay" id="deleteOverlay">
  <div class="modal modal-sm">
    <div class="modal-header">
      <div class="modal-title">Delete Order</div>
      <button class="modal-close" id="closeDelete">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--muted);line-height:1.6">Delete order <strong id="deleteOrderId" style="color:var(--text)"></strong>?</p>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="cancelDelete">Cancel</button>
      <button class="btn-delete" id="confirmDelete">Delete</button>
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:5000/api';
  let orders = [];
  let deleteId = null;

  document.getElementById('dateDisplay').textContent =
    new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });

  const statusMap = {
    Pending:    { cls: 'warn', label: 'Pending' },
    Processing: { cls: 'blue', label: 'Processing' },
    Delivered:  { cls: 'ok',   label: 'Delivered' },
    Cancelled:  { cls: 'low',  label: 'Cancelled' },
  };

  async function loadOrders() {
    const res = await fetch(`${API}/orders`);
    orders = await res.json();
    render();
  }

  function render() {
    const search  = document.getElementById('searchInput').value.toLowerCase();
    const filterS = document.getElementById('filterStatus').value;
    const filtered = orders.filter(o =>
      (o.order_id.toLowerCase().includes(search) || o.product.toLowerCase().includes(search)) &&
      (!filterS || o.status === filterS)
    );
    document.getElementById('tableBody').innerHTML = filtered.map(o => {
      const st = statusMap[o.status] || { cls: 'ok', label: o.status };
      return `<tr>
        <td class="sku">${o.order_id}</td>
        <td><strong>${o.product}</strong></td>
        <td class="sku">${o.supplier}</td>
        <td>${o.qty}</td>
        <td>₹${(o.qty * o.price).toLocaleString()}</td>
        <td class="sku">${o.date}</td>
        <td><span class="badge ${st.cls}">${st.label}</span></td>
        <td><div class="action-btns">
          <button class="btn-icon del" onclick="openDelete(${o.id}, '${o.order_id}')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
        </div></td>
      </tr>`;
    }).join('') || `<tr><td colspan="8" style="color:var(--muted);font-size:11px;padding:20px">No orders found.</td></tr>`;
  }

  function closeModal()  { document.getElementById('modalOverlay').classList.remove('active'); }
  function openDelete(id, orderId) {
    deleteId = id;
    document.getElementById('deleteOrderId').textContent = orderId;
    document.getElementById('deleteOverlay').classList.add('active');
  }
  function closeDelete() { document.getElementById('deleteOverlay').classList.remove('active'); }

  document.getElementById('saveOrder').addEventListener('click', async () => {
    const body = {
      product:  document.getElementById('fProduct').value.trim(),
      supplier: document.getElementById('fSupplier').value.trim(),
      qty:      parseInt(document.getElementById('fQty').value),
      price:    parseFloat(document.getElementById('fPrice').value),
      status:   document.getElementById('fStatus').value,
      date:     document.getElementById('fDate').value
    };
    if (!body.product || isNaN(body.qty) || isNaN(body.price)) return;
    await fetch(`${API}/orders`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    closeModal();
    loadOrders();
  });

  document.getElementById('confirmDelete').addEventListener('click', async () => {
    await fetch(`${API}/orders/${deleteId}`, { method: 'DELETE' });
    closeDelete();
    loadOrders();
  });

  document.getElementById('openModal').addEventListener('click', () => {
    document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('modalOverlay').classList.add('active');
  });
  document.getElementById('closeModal').addEventListener('click', closeModal);
  document.getElementById('cancelModal').addEventListener('click', closeModal);
  document.getElementById('closeDelete').addEventListener('click', closeDelete);
  document.getElementById('cancelDelete').addEventListener('click', closeDelete);
  document.getElementById('searchInput').addEventListener('input', render);
  document.getElementById('filterStatus').addEventListener('change', render);

  loadOrders();
</script>
</body>
</html>
